<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audion</title>

  <link rel="stylesheet" href="styles.css" />
  <script>
    (function () {
      try {
        const settings = JSON.parse(localStorage.getItem('af_settings') || '{}');
        const theme = settings.theme || 'dark';
        document.documentElement.classList.add(theme + '-theme');

        const savedW = localStorage.getItem('af_sidebar_w');
        if (savedW) {
          document.documentElement.style.setProperty('--sidebar-w', savedW);
        }

        window.addEventListener('DOMContentLoaded', () => {
          document.body.classList.add(theme + '-theme');
        });
      } catch (e) { }
    })();
  </script>
</head>

<body>

  <div class="titlebar" data-tauri-drag-region>
    <div class="titlebar-logo">
      ▶ Audion
    </div>
    <div class="titlebar-controls" style="pointer-events: auto;">
      <button class="tb-btn tb-mini" id="btnMiniMode" title="ミニプレイヤー" style="pointer-events: auto;">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="4" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.5" />
          <path d="M9 7l2 2-2 2" stroke="currentColor" stroke-width="1.5" />
        </svg>
      </button>
      <button class="tb-btn tb-settings" id="btnSettings" title="設定" style="pointer-events: auto;">
        <img src="assets/settings.png" alt="Settings" width="16" height="16" style="filter: brightness(0) invert(0.8);">
      </button>
      <button class="tb-btn tb-min" id="tbMin" title="最小化" style="pointer-events: auto;">
        <svg width="10" height="1" viewBox="0 0 10 1">
          <rect width="10" height="1" fill="currentColor" />
        </svg>
      </button>
      <button class="tb-btn tb-max" id="tbMax" title="最大化" style="pointer-events: auto;">
        <svg width="9" height="9" viewBox="0 0 9 9">
          <rect x="0.5" y="0.5" width="8" height="8" stroke="currentColor" fill="none" />
        </svg>
      </button>
      <button class="tb-btn tb-close" id="tbClose" title="閉じる" style="pointer-events: auto;">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="add-bar">
          <button class="btn-primary" id="btnOpenFiles" title="ファイルを個別に選択" data-i18n-title="add_file">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2 4a2 2 0 012-2h3l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" stroke="currentColor"
                stroke-width="1.4" />
            </svg>
            <span data-i18n="add_file">ファイル</span>
          </button>
          <button class="btn-primary" id="btnOpenFolder" title="フォルダ内の曲をすべて追加" data-i18n-title="add_folder">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M2 4a2 2 0 012-2h3l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" stroke="currentColor"
                stroke-width="1.4" />
              <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.2" />
              <path d="M10 8v4M8 10h4" stroke="currentColor" stroke-width="1.2" />
            </svg>
            <span data-i18n="add_folder">フォルダ</span>
          </button>
        </div>

        <div class="search-bar">
          <div class="search-input-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4" />
              <path d="M11 11l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
            <input type="search" id="plSearch" placeholder="曲名、アーティスト名で検索..." data-i18n-placeholder="search_placeholder"
              autocomplete="off">
          </div>
        </div>

        <div class="playlist-hdr">
          <span class="lbl-sm" data-i18n="playlist">プレイリスト</span>
          <div class="playlist-hdr-actions">
            <button class="icon-btn-sm" id="btnSavePlaylist" title="保存" data-i18n-title="save">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <path d="M3 2h8l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor"
                  stroke-width="1.4" />
                <path d="M5 2v4h5V2M5 15v-4h6v4" stroke="currentColor" stroke-width="1.4" />
              </svg>
            </button>
            <button class="icon-btn-sm" id="btnLoadPlaylist" title="読み込み" data-i18n-title="load">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <path d="M2 4a2 2 0 012-2h3l2 2h5a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" stroke="currentColor"
                  stroke-width="1.4" />
                <path d="M8 7v6M6 11l2 2 2-2" stroke="currentColor" stroke-width="1.4" />
              </svg>
            </button>
            <span class="playlist-count" id="playlistCount">0 曲</span>
            <button class="icon-btn-sm" id="btnClearAll" title="全て削除" data-i18n-title="clear_all">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 3h10M5 3V2h4v1M11 3l-.7 8.3A1 1 0 019.3 12H4.7a1 1 0 01-1-.7L3 3" stroke="currentColor"
                  stroke-width="1.3" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>

        <div class="drop-hint" id="dropHint">
          <div class="drop-hint-icon">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <path d="M18 7v14M11 14l7-7 7 7" stroke="url(#dhg)" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M7 26a3 3 0 003 3h16a3 3 0 003-3" stroke="url(#dhg)" stroke-width="2" stroke-linecap="round" />
              <defs>
                <linearGradient id="dhg" x1="7" y1="7" x2="29" y2="29">
                  <stop offset="0%" stop-color="#a78bfa" />
                  <stop offset="100%" stop-color="#38bdf8" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <p data-i18n="drop_hint">ここに音楽ファイルを<br />ドラッグ＆ドロップ</p>
        </div>

        <ul class="playlist" id="playlist" role="listbox" data-i18n-label="playlist" aria-label="プレイリスト"></ul>
      </div>
    </aside>

    <div class="resizer" id="sidebarResizer"></div>
    <main class="player">

      <div class="art-section">
        <canvas id="visualizerCanvas" class="visualizer-canvas"></canvas>
        <div class="art-glow" id="artGlow"></div>
        <div class="art-rings">
          <div class="art-ring r1"></div>
          <div class="art-ring r2"></div>
        </div>
        <div class="album-art" id="albumArt">
          <div class="art-default" id="artDefault">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
              <circle cx="28" cy="28" r="18" stroke="url(#dg)" stroke-width="1.5" />
              <circle cx="28" cy="28" r="5" fill="url(#dg)" />
              <path d="M21 12v7l7-3.5-7-3.5z" fill="url(#dg)" />
              <defs>
                <linearGradient id="dg" x1="10" y1="10" x2="46" y2="46">
                  <stop offset="0%" stop-color="var(--accent-color, #a78bfa)" />
                  <stop offset="100%" stop-color="var(--glow-color, #38bdf8)" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <img id="artImg" alt="Album Art" style="display:none" crossorigin="anonymous" />
        </div>
        <div class="vinyl-center" id="vinylCenter"></div>
      </div>

      <div class="track-section">
        <div class="track-title-wrap" id="trackTitleWrap">
          <h1 class="track-title" id="trackTitle" data-i18n="select_track">曲を選択してください</h1>
        </div>
        <p class="track-sub" id="trackSub" data-i18n="welcome">Audion へようこそ</p>
      </div>

      <div class="progress-section">
        <span class="time-lbl" id="curTime">0:00</span>
        <div class="seeker" id="seeker" role="slider" tabindex="0" data-i18n-label="playback_position" aria-label="再生位置"
          aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="seeker-buf" id="seekBuf"></div>
          <div class="seeker-fill" id="seekFill"></div>
          <div class="seeker-thumb" id="seekThumb"></div>
        </div>
        <span class="time-lbl" id="durTime">0:00</span>
      </div>

      <div class="controls-section">
        <button class="ctrl-icon" id="shuffleBtn" title="シャッフル" data-i18n-title="shuffle">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M2 5h3l7 10h5M17 5h-3l-2 2.5M13.5 12.5l1 1.5H17" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" />
            <path d="M15 3l2 2-2 2M15 13l2 2-2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button class="ctrl-icon ctrl-md" id="prevBtn" title="前の曲" data-i18n-title="prev">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M5 4v14M17 4L8 11l9 7V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button class="play-btn" id="playBtn" data-i18n-label="play_pause" aria-label="再生/一時停止">
          <svg class="ic-play" width="26" height="26" viewBox="0 0 26 26">
            <path d="M8 5l14 8-14 8V5z" fill="currentColor" />
          </svg>
          <svg class="ic-pause" width="26" height="26" viewBox="0 0 26 26" style="display:none">
            <rect x="5" y="4" width="5" height="18" rx="2" fill="currentColor" />
            <rect x="16" y="4" width="5" height="18" rx="2" fill="currentColor" />
          </svg>
        </button>
        <button class="ctrl-icon ctrl-md" id="nextBtn" title="次の曲" data-i18n-title="next">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M17 4v14M5 4l9 7-9 7V4z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button class="ctrl-icon" id="repeatBtn" title="リピート" data-i18n-title="repeat">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 7V5a2 2 0 012-2h8l2 2M17 13v2a2 2 0 01-2 2H7l-2-2" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" />
            <path d="M13 3l2 2-2 2M7 17l-2-2 2-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
          <span class="repeat-badge" id="repeatBadge" style="display:none">1</span>
        </button>
      </div>

      <div class="volume-section">
        <button class="ctrl-icon" id="muteBtn" title="ミュート" data-i18n-title="mute">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" id="volIcon">
            <path d="M3 6.5H1.5A.5.5 0 001 7v4a.5.5 0 00.5.5H3l4 4v-13L3 6.5z" fill="currentColor" />
            <path d="M11 6a4 4 0 010 6M13.5 3.5a8 8 0 010 11" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" />
          </svg>
        </button>
        <div class="vol-bar" id="volBar" role="slider" tabindex="0" data-i18n-label="volume" aria-label="音量"
          aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
          <div class="vol-fill" id="volFill" style="width:80%"></div>
          <div class="vol-thumb" id="volThumb" style="left:80%"></div>
        </div>
      </div>

      <div class="speed-ctrl">
        <span data-i18n="speed">速度</span>
        <input type="range" id="speedSlider" class="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0">
        <span class="speed-lbl" id="speedLbl">1.0x</span>
      </div>

    </main>
  </div>

  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-overlay-content">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <path d="M32 14v28M20 28l12-14 12 14" stroke="url(#dog)" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round" />
        <path d="M14 50a4 4 0 004 4h28a4 4 0 004-4" stroke="url(#dog)" stroke-width="3" stroke-linecap="round" />
        <defs>
          <linearGradient id="dog" x1="14" y1="14" x2="50" y2="50">
            <stop offset="0%" stop-color="#a78bfa" />
            <stop offset="100%" stop-color="#38bdf8" />
          </linearGradient>
        </defs>
      </svg>
      <p data-i18n="drop_overlay">ドロップして追加</p>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
      <div class="modal-hdr">
        <h3 data-i18n="settings">設定</h3>
        <button class="modal-close" id="btnCloseSettings">&times;</button>
      </div>
      <div class="modal-body">

        <div class="setting-item">
          <label class="setting-lbl">
            <span data-i18n="always_on_top">ウインドウを常に手前に表示</span>
            <input type="checkbox" id="checkOnTop">
          </label>
        </div>

        <div class="setting-item">
          <label class="setting-lbl">
            <span data-i18n="restore_session">起動時に前回の状態を復元する</span>
            <input type="checkbox" id="checkRestoreSession">
          </label>
        </div>

        <div class="setting-divider"></div>

        <div class="setting-item">
          <label class="form-group">
            <span data-i18n="theme">テーマ</span>
            <div class="theme-toggle-wrap" style="margin-top: 8px;">
              <button class="theme-btn" id="btnThemeDark" data-theme="dark" data-i18n="theme_dark">ダーク</button>
              <button class="theme-btn" id="btnThemeLight" data-theme="light" data-i18n="theme_light">ライト</button>
            </div>
          </label>
        </div>

        <div class="setting-item">
          <label class="form-group">
            <span data-i18n="language">言語</span>
            <select id="langSelect" class="select-input" style="margin-top: 8px;">
              <option value="ja">日本語</option>
              <option value="en">English</option>
              <option value="ko">한국어</option>
              <option value="zh">简体中文</option>
            </select>
          </label>
        </div>

        <div class="setting-divider"></div>

        <button class="btn-primary" id="btnSaveSettings" style="width: 100%; margin-bottom: 15px;"
          data-i18n="save_settings">設定を保存</button>
        <div class="setting-item">
          <button class="btn-secondary" id="btnReportBug">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="margin-right: 6px;">
              <path d="M8 11v.01M8 8V5m7 3a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" />
            </svg>
            <span data-i18n="report_bug">不具合を報告する</span>
          </button>
        </div>
        <p class="version-text" style="font-size: 10px; opacity: 0.5; margin-top: 10px; text-align: center;">Ver <span
            id="appVersion">0.0.0</span></p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="bugModal">
    <div class="modal-card">
      <div class="modal-hdr">
        <h3 data-i18n="bug_report_title">不具合を報告</h3>
        <button class="modal-close" id="btnCloseBug">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="bugCategory" data-i18n="feedback_category">カテゴリー</label>
          <select id="bugCategory" class="select-input">
            <option value="bug" data-i18n="category_bug">不具合報告</option>
            <option value="request" data-i18n="category_request">要望・改善案</option>
            <option value="other" data-i18n="category_other">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="bugTitle" data-i18n="bug_form_title">件名</label>
          <input type="text" id="bugTitle" placeholder="不具合の要約" data-i18n-placeholder="bug_form_placeholder_title"
            class="form-input">
        </div>
        <div class="form-group">
          <label for="bugDesc" data-i18n="bug_form_desc">詳細</label>
          <textarea id="bugDesc" placeholder="発生手順や期待される動作など..." data-i18n-placeholder="bug_form_placeholder_desc"
            class="form-input" rows="5"></textarea>
        </div>
        <div class="form-error" id="bugError" hidden></div>
        <button class="btn-primary" id="btnSubmitBug" style="width: 100%; margin-top: 10px;" data-i18n="bug_submit">
          送信する
        </button>
        <p class="setting-hint" style="margin-top: 15px;" data-i18n="bug_hint">※開発者に報告内容が送信されます</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <audio id="audio" crossorigin="anonymous"></audio>
  <canvas id="colorCanvas" style="display:none;"></canvas>
  <script type="module" src="main.js"></script>
</body>

</html>
